<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
</head>
<body style="background:#0b0e14; color:#53fc18; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div id="status">Trocando código por token de acesso, aguarde...</div>

    <script>
        async function finalizarLogin() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (!code) {
                document.getElementById('status').innerText = "Erro: Código não encontrado na URL.";
                return;
            }

            const clientId = '01KM22VQ7Y1ZYN9WP8E1746HVZ';
            const clientSecret = '0ff92471284ba3df3bf2232595cae40c76d76869862a2a145cfa350cc837b995'; 
            const redirectUri = 'http://localhost:5500/callback.html';
            
            // Resgata o verificador que o index.html salvou
            const verifier = localStorage.getItem('kick_pkce_verifier');

            try {
                const response = await fetch('https://id.kick.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: clientId,
                        client_secret: clientSecret,
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier // A Kick exige isso agora!
                    })
                });

                const textoResposta = await response.text();
                
                let data;
                try {
                    data = JSON.parse(textoResposta);
                } catch (e) {
                    document.getElementById('status').innerText = "A Kick retornou um erro: " + textoResposta;
                    return;
                }

                if (data.access_token) {
                    localStorage.setItem('kick_access_token', data.access_token);
                    window.location.href = 'fariassim.html';
                } else {
                    document.getElementById('status').innerText = "Erro na troca: " + JSON.stringify(data);
                }
            } catch (err) {
                document.getElementById('status').innerText = "Erro de conexão: " + err.message;
            }
        }

        finalizarLogin();
    </script>
</body>
</html>
