<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
</head>
<body style="background:#0b0e14; color:#53fc18; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div id="status">Trocando código por token...</div>

    <script>
        async function finalizarLogin() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (!code) { document.getElementById('status').innerText = "Erro: Código não encontrado."; return; }

            const clientId = '01KM22VQ7Y1ZYN9WP8E1746HVZ';
            const redirectUri = 'https://felipefariastv.github.io/FelipeFariasTV/callback.html';
            const verifier = localStorage.getItem('kick_pkce_verifier');

            try {
                // Aqui removemos o client_secret para ver se a Kick aceita como Public Client
                const response = await fetch('https://id.kick.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: clientId,
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });

                const data = await response.json();
                
                if (data.access_token) {
                    localStorage.setItem('kick_access_token', data.access_token);
                    window.location.href = 'fariassim.html';
                } else {
                    document.getElementById('status').innerText = "Erro na troca (talvez o client_secret seja exigido ou o ID esteja errado): " + JSON.stringify(data);
                }
            } catch (err) {
                document.getElementById('status').innerText = "Erro de rede: " + err.message;
            }
        }
        finalizarLogin();
    </script>
</body>
</html>
