<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Diagnóstico de Erro</title>
</head>
<body style="background:#000; color:#ff0000; font-family:monospace; padding: 20px;">
    <h2>Analisando Erro da Kick...</h2>
    <div id="debug-log"></div>

    <script>
        async function finalizarLogin() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const debug = document.getElementById('debug-log');

            if (!code) { debug.innerText = "Erro: Código não encontrado."; return; }

            const clientId = '01KM22VQ7Y1ZYN9WP8E1746HVZ';
            const clientSecret = '0ff92471284ba3df3bf2232595cae40c76d76869862a2a145cfa350cc837b995'; 
            const redirectUri = 'https://felipefariastv.github.io/FelipeFariasTV/callback.html';
            const verifier = localStorage.getItem('kick_pkce_verifier');

            debug.innerHTML += "➤ Iniciando troca de código...<br>";

            try {
                const response = await fetch('https://id.kick.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: clientId,
                        client_secret: clientSecret,
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });

                // Lemos como TEXTO puro, não como JSON
                const rawResponse = await response.text();
                
                debug.innerHTML += `➤ Status da resposta: ${response.status}<br>`;
                debug.innerHTML += `➤ Resposta crua do servidor:<br><pre>${rawResponse}</pre>`;

                if (response.ok) {
                    const data = JSON.parse(rawResponse);
                    localStorage.setItem('kick_access_token', data.access_token);
                    window.location.href = 'fariassim.html';
                } else {
                    debug.innerHTML += "<br>❌ A KICK REJEITOU A TROCA. O erro acima explica o motivo.";
                }
            } catch (err) {
                debug.innerHTML += `<br>❌ Erro no script: ${err.message}`;
            }
        }
        finalizarLogin();
    </script>
</body>
</html>
