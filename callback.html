<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
</head>
<body style="background:#0b0e14; color:#53fc18; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; text-align: center; padding: 20px;">
    <div id="status">Trocando código por token, aguarde...</div>

    <script>
        async function finalizarLogin() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const statusDiv = document.getElementById('status');

            if (!code) { statusDiv.innerText = "Erro: Código não encontrado na URL."; return; }

            const clientId = '01KM22VQ7Y1ZYN9WP8E1746HVZ';
            // O link precisa ser exatamente o que você cadastrou no painel da Kick
            const redirectUri = 'https://felipefariastv.github.io/FelipeFariasTV/callback.html';
            const verifier = localStorage.getItem('kick_pkce_verifier');

            try {
                // Tenta trocar o código pelo token SEM o client_secret (Padrão PKCE para Web)
                const response = await fetch('https://id.kick.com/oauth/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: clientId,
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });

                // Captura a resposta do servidor
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('kick_access_token', data.access_token);
                    window.location.href = 'fariassim.html';
                } else {
                    // Se der erro, mostra exatamente o que aconteceu
                    statusDiv.style.color = "red";
                    statusDiv.innerText = "Erro " + response.status + ": " + JSON.stringify(data);
                }
            } catch (err) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "Erro de rede ou bloqueio CORS: " + err.message;
            }
        }
        finalizarLogin();
    </script>
</body>
</html>
