<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Autenticando...</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; padding: 20px;">
    <h2>Tentando autenticação com novo segredo...</h2>
    <div id="status"></div>

    <script>
        async function finalizarLogin() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const debug = document.getElementById('status');

            if (!code) { debug.innerText = "Erro: Código não encontrado."; return; }

            const clientId = '01KM22VQ7Y1ZYN9WP8E1746HVZ';
            // Novo segredo inserido:
            const clientSecret = 'e4e3a5bd8c4045d998002db081ebc55d20756048a92bbb9ee369e71acd9e9f4d'; 
            const redirectUri = 'https://felipefariastv.github.io/FelipeFariasTV/callback.html';
            const verifier = localStorage.getItem('kick_pkce_verifier');

            // Autenticação Basic (Obrigatória para a Kick aceitar o Secret)
            const authString = btoa(`${clientId}:${clientSecret}`);

            try {
                const response = await fetch('https://id.kick.com/oauth/token', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': `Basic ${authString}`
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectUri,
                        code_verifier: verifier
                    })
                });

                const rawResponse = await response.text();
                
                if (response.ok) {
                    const data = JSON.parse(rawResponse);
                    localStorage.setItem('kick_access_token', data.access_token);
                    window.location.href = 'fariassim.html';
                } else {
                    debug.innerHTML = `❌ A KICK REJEITOU O LOGIN.<br><br>Status: ${response.status}<br>Erro: ${rawResponse}`;
                }
            } catch (err) {
                debug.innerText = "Erro de conexão: " + err.message;
            }
        }
        finalizarLogin();
    </script>
</body>
</html>
